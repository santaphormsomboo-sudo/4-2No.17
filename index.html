<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Pastel Todo List 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f7f3ef;
            --card-color: #ffffff;
            --primary-color: #ffb7b2;
            --secondary-color: #ffdac1;
            --success-color: #b5ead7;
            --text-color: #6d5952;
        }

        body {
            font-family: 'Mitr', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-color);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(229, 210, 197, 0.6);
            width: 100%;
            max-width: 700px;
            position: relative;
            border: 4px solid #fff;
        }

        /* ตกแต่งน้องสัตว์ */
        .decor-animal {
            position: absolute;
            font-size: 2.5rem;
            animation: bounce 2s infinite alternate;
        }
        .cat { top: -35px; left: 20px; }
        .bunny { top: -35px; right: 20px; }
        .bear { bottom: -20px; right: 50px; font-size: 2rem; }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        h1 {
            text-align: center;
            color: #e29587;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        /* ส่วนนับงาน Counter */
        .counter-box {
            display: flex;
            justify-content: space-around;
            background: #fff5f5;
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 2px dashed #ffcad4;
        }

        .counter-item {
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .counter-item span {
            display: block;
            font-size: 1.4rem;
            color: #ff9aa2;
        }

        /* ฟอร์มกรอกข้อมูล */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #ffe5ec;
            border-radius: 50px;
            font-family: 'Mitr', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(255, 183, 178, 0.5);
        }

        .btn-add {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Mitr', sans-serif;
            font-size: 1rem;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-add:hover {
            background-color: #ff9aa2;
            transform: scale(1.05);
        }

        /* ตารางโชว์งาน */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: var(--secondary-color);
            padding: 12px;
            border-radius: 10px;
            font-weight: 500;
        }

        td {
            padding: 15px 12px;
            border-bottom: 1px solid #fff0ed;
        }

        tr:hover {
            background-color: #fffaf7;
        }

        /* สไตล์สถานะและปุ่มควบคุม */
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
        }
        .status-pending { background-color: #ffe5ec; color: #ff5c8a; }
        .status-completed { background-color: var(--success-color); color: #4e8774; }

        .completed-text {
            text-decoration: line-through;
            color: #b5b5b5;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1.1rem;
            transition: transform 0.2s;
            padding: 4px;
        }
        .btn-action:hover { transform: scale(1.2); }
        .btn-check { color: #85ea85; }
        .btn-edit { color: #ffb347; }
        .btn-delete { color: #ff6b6b; }

        /* หน้าต่างแก้ไขงาน Pop-up (Modal) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .modal-btns {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-save { background: var(--success-color); color: #4e8774; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-family: 'Mitr'; }
        .btn-cancel { background: #eee; color: #666; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-family: 'Mitr'; }
    </style>
</head>
<body>

    <div class="container">
        <div class="decor-animal cat">🐱</div>
        <div class="decor-animal bunny">🐰</div>
        <div class="decor-animal bear">🐻🐾</div>

        <h1><i class="fa-solid fa-heart"></i> สมุดบันทึกงานของฉัน <i class="fa-solid fa-heart"></i></h1>
        
        <div class="counter-box">
            <div class="counter-item">งานทั้งหมด <span id="total-count">0</span></div>
            <div class="counter-item">กำลังทำ ⏳ <span id="pending-count">0</span></div>
            <div class="counter-item">เสร็จแล้ว 🎉 <span id="completed-count">0</span></div>
        </div>

        <div class="input-group">
            <input type="text" id="todo-input" placeholder="พิมพ์งานที่ต้องทำตรงนี้เลยน้า...">
            <button class="btn-add" onclick="addTodo()">เพิ่มงาน ✨</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 50%;">ชื่องาน</th>
                        <th style="width: 25%;">สถานะ</th>
                        <th style="width: 25%; text-align: center;">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="todo-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3>แก้ไขชื่องาน ✏️</h3>
            <input type="text" id="edit-input" style="width: 80%; margin-bottom: 10px;">
            <div class="modal-btns">
                <button class="btn-save" onclick="saveEdit()">บันทึก</button>
                <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script>
        // อาร์เรย์เก็บข้อมูลงาน
        let todos = [
            { id: 1, text: "ให้อาหารน้องแมว 🐟", completed: false },
            { id: 2, text: "ทำการบ้านวิชาคณิตศาสตร์ 📝", completed: true }
        ];
        let currentEditId = null;

        // ฟังก์ชันวาดตารางและอัปเดตตัวนับงาน
        function render() {
            const tbody = document.getElementById('todo-table-body');
            tbody.innerHTML = '';

            let total = todos.length;
            let completed = 0;
            let pending = 0;

            todos.forEach(todo => {
                if(todo.completed) completed++; else pending++;

                const tr = document.createElement('tr');
                
                tr.innerHTML = `
                    <td class="${todo.completed ? 'completed-text' : ''}">${todo.text}</td>
                    <td>
                        <span class="status-badge ${todo.completed ? 'status-completed' : 'status-pending'}">
                            ${todo.completed ? 'เสร็จสิ้น ✨' : 'กำลังทำ ⏳'}
                        </span>
                    </td>
                    <td class="actions" style="justify-content: center;">
                        <button class="btn-action btn-check" onclick="toggleCheck(${todo.id})" title="เช็คงาน">
                            <i class="fa-solid ${todo.completed ? 'fa-circle-xmark' : 'fa-circle-check'}"></i>
                        </button>
                        <button class="btn-action btn-edit" onclick="openEditModal(${todo.id}, '${todo.text}')" title="แก้ไข">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                        <button class="btn-action btn-delete" onclick="deleteTodo(${todo.id})" title="ลบ">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // อัปเดตตัวนับงานบนหน้าเว็บ
            document.getElementById('total-count').innerText = total;
            document.getElementById('pending-count').innerText = pending;
            document.getElementById('completed-count').innerText = completed;
        }

        // 1. ฟังก์ชันเพิ่มงาน
        function addTodo() {
            const input = document.getElementById('todo-input');
            const text = input.value.trim();
            if (text === '') return alert('กรุณาพิมพ์ชื่องานก่อนน้า 🐾');

            const newTodo = {
                id: Date.now(),
                text: text,
                completed: false
            };
            todos.push(newTodo);
            input.value = '';
            render();
        }

        // 2. ฟังก์ชันเช็คงาน (สลับสถานะ ทำแล้ว/ยังไม่ทำ)
        function toggleCheck(id) {
            todos = todos.map(todo => {
                if(todo.id === id) {
                    return { ...todo, completed: !todo.completed };
                }
                return todo;
            });
            render();
        }

        // 3. ฟังก์ชันลบงาน
        function deleteTodo(id) {
            if(confirm('แน่ใจไหมน้าว่าจะลบงานชิ้นนี้? 🐾')) {
                todos = todos.filter(todo => todo.id !== id);
                render();
            }
        }

        // 4. ฟังก์ชันเปิดหน้าต่างแก้ไข
        function openEditModal(id, text) {
            currentEditId = id;
            document.getElementById('edit-input').value = text;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
            currentEditId = null;
        }

        // ฟังก์ชันบันทึกการแก้ไข
        function saveEdit() {
            const newText = document.getElementById('edit-input').value.trim();
            if(newText === '') return alert('ชื่องานห้ามว่างน้า!');
            
            todos = todos.map(todo => {
                if(todo.id === currentEditId) {
                    return { ...todo, text: newText };
                }
                return todo;
            });
            closeModal();
            render();
        }

        // รันแสดงผลครั้งแรกเมื่อเปิดเว็บ
        render();
    </script>
</body>
</html>
